<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dictionary App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/your-kit-id.js" crossorigin="anonymous"></script>

<style>
* {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    background-color: #ae9cff;
}

.container {
    background-color: #ffffff;
    width: 90vmin;
    position: absolute;
    transform: translate(-50%, -50%);
    top: 50%;
    left: 50%;
    padding: 80px 50px;
    border-radius: 10px;
    box-shadow: 0 20px 40px rgba(38, 33, 61, 0.2);
}

.search-box {
    width: 100%;
    display: flex;
    justify-content: space-between;
}

.search-box input {
    padding: 10px;
    width: 70%;
    border: none;
    outline: none;
    border-bottom: 3px solid #ae9cff;
    font-size: 16px;
}

.search-box button {
    padding: 15px 0;
    width: 25%;
    background-color: #ae9cff;
    border: none;
    color: #ffffff;
    border-radius: 5px;
    cursor: pointer;
}

.result {
    position: relative;
}

.result h3 {
    font-size: 30px;
    color: #1f194c;
}

.result .word {
    display: flex;
    justify-content: space-between;
    margin-top: 40px;
}

.result button {
    background-color: transparent;
    color: #ae9cff;
    border: none;
    font-size: 18px;
    cursor: pointer;
}

.result .details {
    display: flex;
    gap: 10px;
    color: #b3b6d4;
    margin: 5px 0 20px 0;
    font-size: 14px;
}

.word-meaning {
    color: #575a7b;
}

.word-example {
    color: #575a7b;
    font-style: italic;
    border-left: 5px solid #ae9cff;
    padding-left: 20px;
    margin-top: 30px;
}

.error {
    margin-top: 80px;
    text-align: center;
    color: red;
}
</style>
</head>

<body>

<div class="container">

    <div class="search-box">
        <input type="text" id="inp-word" placeholder="Type a word..." />
        <button id="search-btn">Search</button>
    </div>

    <div class="result" id="result"></div>

    <audio id="sound"></audio>

</div>

<script>
const url = "https://api.dictionaryapi.dev/api/v2/entries/en/";

const result = document.getElementById("result");
const sound = document.getElementById("sound");
const btn = document.getElementById("search-btn");

btn.addEventListener("click", () => {
  let inpWord = document.getElementById("inp-word").value.trim();

  if (inpWord === "") {
    result.innerHTML = `<h3 class="error">Please type a word first!</h3>`;
    return;
  }

  fetch(`${url}${inpWord}`)
    .then((response) => response.json())
    .then((data) => {

      let audioSrc = "";
      if (data[0].phonetics && data[0].phonetics.length > 0) {
        for (let i = 0; i < data[0].phonetics.length; i++) {
          if (data[0].phonetics[i].audio) {
            audioSrc = data[0].phonetics[i].audio;
            break;
          }
        }
      }

      result.innerHTML = `
        <div class="word">
          <h3>${inpWord}</h3>
          <button id="sound-btn">
            🔊
          </button>
        </div>

        <div class="details">
          <p>${data[0].meanings[0].partOfSpeech || ""}</p>
          <p>/${data[0].phonetic || ""}/</p>
        </div>

        <p class="word-meaning">
          ${data[0].meanings[0].definitions[0].definition || ""}
        </p>

        <p class="word-example">
          ${data[0].meanings[0].definitions[0].example || ""}
        </p>
      `;

      if (audioSrc) {
        sound.setAttribute("src", audioSrc.startsWith("https") ? audioSrc : `https:${audioSrc}`);
      } else {
        sound.removeAttribute("src");
      }

      document.getElementById("sound-btn").addEventListener("click", playSound);
    })
    .catch(() => {
      result.innerHTML = `<h3 class="error">Couldn't Find The Word</h3>`;
    });
});

function playSound() {
  if (sound.getAttribute("src")) {
    sound.play();
  } else {
    const wordElem = document.querySelector(".word h3");
    if (wordElem) {
      const utter = new SpeechSynthesisUtterance(wordElem.textContent);
      utter.lang = "en-US";
      speechSynthesis.speak(utter);
    }
  }
}
</script>

</body>
</html>
